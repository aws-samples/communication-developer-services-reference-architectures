# =============================================================================
# CDS Reference Architectures catalog
# =============================================================================
# This file is the single source of truth. README.md is generated from it by
# CI (scripts/generate_readme.py). DO NOT edit README.md by hand.
#
# To add an entry: copy the template below, fill it in, open a merge request.
# CI validates the file and regenerates the README.
#
# -----------------------------------------------------------------------------
# Entry template (copy from "# --- copy below ---" to "# --- copy above ---")
# -----------------------------------------------------------------------------
# --- copy below ---
#   - title: Short human-readable name
#     service: EUM            # one of: EUM | SES | MULTI   (see services: keys)
#     status: mainline        # mainline | archived
#     tags: [genai, whatsapp] # free-form, lowercase; used for filtering/scanning
#     url: https://github.com/aws-samples/your-repo
#     desc: One sentence, no trailing period needed, describing what it does.
# --- copy above ---
#
# Field rules (enforced by CI):
#   title    required, unique
#   service  required, must be a key in `services` below
#   status   required, mainline or archived
#   tags     optional list of lowercase strings
#   url       required, http(s)
#   desc     required, single line
# =============================================================================

# Service groupings. The `label` is the section heading in the README.
# `order` controls section order (lower first). Add new services here.
services:
  EUM:
    label: AWS End User Messaging
    order: 1
    blurb: >-
      WhatsApp, SMS, push and social messaging built on AWS End User Messaging.
      These are the actively maintained, recommended patterns.
  SES:
    label: Amazon Simple Email Service (SES)
    order: 2
    blurb: >-
      Email sending, receiving, event processing and analytics with Amazon SES.
  MULTI:
    label: Multi-channel / Combined
    order: 3
    blurb: >-
      Patterns that combine more than one channel or chain several references
      together.
  PINPOINT:
    label: Amazon Pinpoint (Archived)
    order: 99
    blurb: >-
      Amazon Pinpoint patterns retained for reference. Pinpoint is on a
      deprecation path; prefer AWS End User Messaging and SES for new work.
      These entries are kept so existing links and historical references do not
      break.

# -----------------------------------------------------------------------------
# Entries
# -----------------------------------------------------------------------------
